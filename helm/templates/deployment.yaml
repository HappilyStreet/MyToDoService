apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app }}-deployment
  labels:
    app: {{ .Values.app }}-k8s
spec:
  replicas: 2
  selector:
    matchLabels:
      project: {{ .Values.app }}
  template:
    metadata:
      labels:
        project: {{ .Values.name }}
    spec:
      containers:
        - name: {{ .Values.app }}-web
          image: {{ .Values.image }}
          ports:
          - containerPort: 80

